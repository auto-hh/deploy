services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: auto-hh-postgres
    hostname: ${POSTGRES_HOST:-postgres}
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DATABASE:-database}
      - PGPORT=${POSTGRES_PORT:-5432}
    expose:
      - ${POSTGRES_PORT:-5432}
    volumes:
      - ./data/postgres/:/var/lib/postgresql/
    shm_size: 128mb
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-user}", "-d", "${POSTGRES_DATABASE:-database}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/auto-hh/backend:latest
    container_name: auto-hh-backend
    hostname: ${BACKEND_HOST:-backend}
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-80}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - SECRET_KEY=${SECRET_KEY:-secret_key}
      - JWT_EXPIRATION_DURATION=${JWT_EXPIRATION_DURATION:-24}
      - STATE_EXPIRATION_DURATION=${STATE_EXPIRATION_DURATION:-10}
      - LLM_PATH=${LLM_PATH:-http://llm}
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-database}
      - CLIENT_ID=${CLIENT_ID:-client_id}
      - CLIENT_SECRET=${CLIENT_SECRET:-client_secret}
      - APP_NAME=${APP_NAME:-app_name}
      - APP_VERSION=${APP_VERSION:-app_version}
      - DEV_CONTACT=${DEV_CONTACT:-dev_contact}
      - REDIRECT_URI=${REDIRECT_URI:-https://api.localhost/auth/complete}
      - SITE_URL=${SITE_URL:-https://localhost/}
    expose:
      - ${BACKEND_PORT:-80}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-80}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/auto-hh/frontend:latest
    container_name: auto-hh-frontend
    hostname: frontend
    environment:
      - BACKEND_HOST=${BACKEND_HOST:-backend}
      - BACKEND_PORT=${BACKEND_PORT:-80}
    ports:
      - 80:80
      - 443:443
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

